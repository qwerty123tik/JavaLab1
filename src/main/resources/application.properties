spring.application.name=springrecipe

spring.datasource.url=jdbc:postgresql://localhost:5432/recipeSystem_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.database=postgresql
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

logging.level.com.example.springrecipe=DEBUG
logging.level.com.example.springrecipe.service=INFO
logging.level.com.example.springrecipe.repository=DEBUG
logging.level.com.example.springrecipe.controller=INFO
logging.level.com.example.springrecipe.aspect=DEBUG

logging.level.org.springframework=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.example.springrecipe.controller
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha