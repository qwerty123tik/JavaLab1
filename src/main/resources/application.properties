spring.application.name=springrecipe

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/recipeSystem_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

server.address=0.0.0.0
server.port=${PORT:8080}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.database=postgresql
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

logging.level.com.example.springrecipe=WARN
logging.level.com.example.springrecipe.service=WARN
logging.level.com.example.springrecipe.repository=WARN
logging.level.com.example.springrecipe.controller=INFO
logging.level.com.example.springrecipe.aspect=WARN

# Tomcat
server.tomcat.threads.max=2000
server.tomcat.threads.min-spare=500
server.tomcat.accept-count=5000
server.tomcat.max-connections=20000
server.tomcat.connection-timeout=120000
server.tomcat.keep-alive-timeout=120000
server.tomcat.max-keep-alive-requests=200

# HikariCP
spring.datasource.hikari.maximum-pool-size=1000
spring.datasource.hikari.minimum-idle=200
spring.datasource.hikari.connection-timeout=60000

spring.task.execution.pool.core-size=500
spring.task.execution.pool.max-size=2000
spring.task.execution.pool.queue-capacity=20000

logging.level.org.springframework=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF

logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.example.springrecipe.controller
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0
